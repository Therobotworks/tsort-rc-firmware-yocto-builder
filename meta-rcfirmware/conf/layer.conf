# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-rcfirmware"
BBFILE_PATTERN_meta-rcfirmware = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-rcfirmware = "6"

LAYERDEPENDS_meta-rcfirmware = "core"
LAYERSERIES_COMPAT_meta-rcfirmware = "scarthgap"
